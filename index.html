<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebFrame Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { background-color: #ffffff !important; color: #1a202c !important; border-bottom: none; }
        .iframe-container { height: calc(100vh - 110px); }
    </style>
</head>
<body class="bg-gray-200 h-screen flex flex-col overflow-hidden">

    <div id="tab-bar" class="flex bg-gray-300 p-2 gap-1 items-end border-b border-gray-400">
        <div id="tabs-list" class="flex gap-1">
            </div>
        <button onclick="addNewTab()" class="px-3 py-1 bg-gray-400 hover:bg-gray-500 rounded text-white mb-1 ml-2 transition-colors">+</button>
    </div>

    <div class="bg-white p-2 flex items-center gap-3 shadow-sm border-b border-gray-300">
        <div class="flex gap-2">
            <button onclick="refreshTab()" class="p-1 hover:bg-gray-100 rounded">🔄</button>
        </div>
        <input type="text" id="url-input" 
               class="flex-1 bg-gray-100 border border-gray-300 rounded-full px-4 py-1 focus:outline-none focus:ring-2 focus:ring-blue-400" 
               placeholder="Enter URL (e.g., https://wikipedia.org) and press Enter"
               onkeydown="if(event.key === 'Enter') navigate()">
    </div>

    <div id="browser-viewport" class="flex-1 bg-white">
        </div>

    <script>
        let tabs = [];
        let activeTabId = null;

        function addNewTab(url = 'https://www.wikipedia.org') {
            const id = Date.now();
            const tab = { id, url, title: 'New Tab' };
            tabs.push(tab);
            
            // Create the iframe
            const iframe = document.createElement('iframe');
            iframe.id = `frame-${id}`;
            iframe.src = url;
            iframe.className = "w-full h-full hidden border-none";
            document.getElementById('browser-viewport').appendChild(iframe);

            renderTabs();
            switchTab(id);
        }

        function renderTabs() {
            const list = document.getElementById('tabs-list');
            list.innerHTML = '';
            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `group flex items-center gap-2 px-4 py-1 rounded-t-lg cursor-pointer bg-gray-400 text-gray-700 text-sm transition-all`;
                if(tab.id === activeTabId) tabEl.classList.add('tab-active');
                
                tabEl.innerHTML = `
                    <span onclick="switchTab(${tab.id})">${tab.title}</span>
                    <span onclick="closeTab(${tab.id})" class="hover:text-red-500 font-bold ml-2">×</span>
                `;
                list.appendChild(tabEl);
            });
        }

        function switchTab(id) {
            activeTabId = id;
            const currentTab = tabs.find(t => t.id === id);
            
            // UI updates
            document.querySelectorAll('iframe').forEach(f => f.classList.add('hidden'));
            document.getElementById(`frame-${id}`).classList.remove('hidden');
            document.getElementById('url-input').value = currentTab.url;
            
            renderTabs();
        }

        function navigate() {
            let url = document.getElementById('url-input').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const frame = document.getElementById(`frame-${activeTabId}`);
            frame.src = url;
            
            const tab = tabs.find(t => t.id === activeTabId);
            tab.url = url;
            tab.title = url.split('//')[1].split('/')[0]; // Simple title parser
            renderTabs();
        }

        function closeTab(id) {
            tabs = tabs.filter(t => t.id !== id);
            document.getElementById(`frame-${id}`).remove();
            if (activeTabId === id && tabs.length > 0) {
                switchTab(tabs[0].id);
            } else if (tabs.length === 0) {
                addNewTab();
            } else {
                renderTabs();
            }
        }

        function refreshTab() {
            const frame = document.getElementById(`frame-${activeTabId}`);
            frame.src = frame.src;
        }

        // Initialize first tab
        addNewTab();
    </script>
</body>
</html>
